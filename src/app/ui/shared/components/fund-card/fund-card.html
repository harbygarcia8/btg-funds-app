<div class="card">
  <div class="category-badge" [class]="fund().category.toLowerCase()">
    {{ fund().category }}
  </div>
  <h3>{{ fund().name }}</h3>
  <p class="min-amount">
    Mínimo: <strong>{{ fund().minAmount | currency }}</strong>
  </p>
  <button (click)="subscribe.emit(fund())">Invertir ahora</button>
</div>
